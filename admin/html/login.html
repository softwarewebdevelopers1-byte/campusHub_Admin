<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusHub - Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" href="../images/campusHub.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
      }

      body {
        /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-container {
        background: white;
        width: 100%;
        max-width: 400px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo i {
        font-size: 50px;
        color: #2563eb;
        background: #dbeafe;
        padding: 15px;
        border-radius: 50%;
      }

      .logo h2 {
        margin-top: 15px;
        color: #1e293b;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 14px;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 5px;
        color: #475569;
      }

      .forgot a {
        color: #2563eb;
        text-decoration: none;
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
      }

      .signup-link {
        text-align: center;
        font-size: 14px;
        color: #64748b;
      }

      .signup-link a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }
      .error-message {
        top: 0;
        position: absolute;
        background: #fee2e2;
        color: #ef4444;
        padding: 10px 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        text-align: center;
      }
      .error-cont {
        display: flex;
        position: relative;
        flex-direction: column;
        gap: 20px;
        z-index: 1000;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="error-cont" id="error"></div>
      <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        <h2>Welcome Back</h2>
      </div>
      <form id="formElement">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            placeholder="Enter your email"
            id="userEmail"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            placeholder="Enter your password"
            id="userPassword"
            required
          />
        </div>
        <!-- 
        <div class="remember-forgot">
          <label class="remember">
            <input type="checkbox" /> Remember me
          </label>
          <div class="forgot">
            <a href="#">Forgot password?</a>
          </div>
        </div> -->

        <button type="submit" class="login-btn" id="sendBtn">Login</button>

        <div class="signup-link">
          Don't have an account? <a href="signup.html">Sign up</a>
        </div>
      </form>
    </div>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
