<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../images/campusHub.png" />
    <title>CampusHub - Sign Up</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
      }

      body {
        /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .signup-container {
        background: white;
        width: 100%;
        max-width: 400px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo i {
        font-size: 50px;
        color: #2563eb;
        background: #dbeafe;
        padding: 15px;
        border-radius: 50%;
      }

      .logo h2 {
        margin-top: 15px;
        color: #1e293b;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .terms {
        margin-bottom: 20px;
        font-size: 14px;
        color: #475569;
      }

      .terms input {
        margin-right: 5px;
      }

      .terms a {
        color: #2563eb;
        text-decoration: none;
      }

      .signup-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .signup-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
      }

      .login-link {
        text-align: center;
        font-size: 14px;
        color: #64748b;
      }

      .login-link a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <div class="logo">
        <i class="fas fa-user-plus"></i>
        <h2>Create Account</h2>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            placeholder="Enter your full name"
            id="lecturerName"
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            placeholder="Enter your email"
            id="lecturerEmail"
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            placeholder="Create a password"
            id="lecturerPassword"
          />
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input
            type="password"
            placeholder="Confirm your password"
            id="lecturerConfirmPassword"
          />
        </div>

        <!-- <div class="terms">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            </div> -->

        <button type="submit" class="signup-btn">Sign Up</button>

        <div id="message" role="alert" style="margin-top:12px;color:#b91c1c;font-weight:600;display:none"></div>

        <div class="login-link">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </form>
    </div>
    <script type="module" src="../js/signUp.js"></script>
  </body>
</html>
