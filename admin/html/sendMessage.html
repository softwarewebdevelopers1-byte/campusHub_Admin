<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusHub - Send Message</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .message-container {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        padding: 30px;
      }

      h2 {
        font-size: 24px;
        color: #1e293b;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      h2 i {
        color: #2563eb;
      }

      .subtitle {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f1f5f9;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #2563eb;
        background: white;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      input::placeholder,
      textarea::placeholder {
        color: #94a3b8;
      }

      textarea {
        resize: vertical;
        min-height: 150px;
      }

      .char-count {
        text-align: right;
        font-size: 12px;
        color: #64748b;
        margin-top: 5px;
      }

      .button {
        width: 100%;
        padding: 14px 20px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 25px;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
      }

      .button:active {
        transform: translateY(0);
      }

      .button i {
        font-size: 18px;
      }

      .info-text {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: #64748b;
      }

      .info-text i {
        color: #2563eb;
        margin-right: 5px;
      }
      .alert-container {
        margin-bottom: 20px;
        padding: 14px 16px;
        border-radius: 10px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeIn 0.3s ease-in-out;
      }

      .alert-error {
        background: #fdecea;
        color: #842029;
        border: 1px solid #f5c2c7;
      }

      .alert-success {
        background: #e6f4ea;
        color: #1e4620;
        border: 1px solid #badbcc;
      }
      .nav-tabs {
        display: flex;
        margin-bottom: 20px;
        background: #f1f5f9;
        padding: 5px;
        border-radius: 10px;
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-weight: 600;
        border-radius: 8px;
        transition: all 0.3s ease;
        color: #475569;
      }

      .tab-btn.active {
        background: white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        color: #2563eb;
      }

      .messages-list {
        max-height: 350px;
        overflow-y: auto;
      }

      .message-item {
        padding: 15px;
        border-radius: 10px;
        background: #f8fafc;
        margin-bottom: 12px;
        border: 1px solid #e2e8f0;
      }

      .message-item h4 {
        font-size: 14px;
        margin-bottom: 6px;
        color: #1e293b;
      }

      .message-item p {
        font-size: 13px;
        color: #475569;
      }

      .message-time {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 6px;
      }
      .message-item {
        position: relative;
      }

      .delete-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        border: none;
        background: #fdecea;
        color: #842029;
        border-radius: 6px;
        padding: 5px 8px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s ease;
      }

      .delete-btn:hover {
        background: #f8d7da;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 500px) {
        .message-container {
          padding: 20px;
        }

        h2 {
          font-size: 22px;
        }
      }
    </style>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="message-container">
      <!-- Navigation Tabs -->
      <div class="nav-tabs">
        <button class="tab-btn active" id="sendTab">
          <i class="fas fa-paper-plane"></i> Send
        </button>
        <button class="tab-btn" id="viewTab">
          <i class="fas fa-inbox"></i> Sent
        </button>
      </div>

      <!--  SEND PAGE -->
      <div id="sendPage">
        <h2>
          <i class="fas fa-paper-plane"></i>
          Send Message
        </h2>
        <div class="subtitle">Compose your message to students</div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input
            type="text"
            id="subject"
            placeholder="Enter message subject..."
          />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea
            id="message"
            placeholder="Type your message here..."
          ></textarea>
        </div>

        <button class="button" id="sendBtn">
          <i class="fas fa-paper-plane"></i>
          Send Message
        </button>
      </div>

      <!-- VIEW PAGE  -->
      <div id="viewPage" style="display: none">
        <h2>
          <i class="fas fa-inbox"></i>
          Sent Messages
        </h2>
        <div class="subtitle">Previously sent notifications</div>

        <div id="messagesList" class="messages-list">
          <p class="empty">No messages found.</p>
        </div>
      </div>
    </div>

    <script type="module" src="../js/sendMessage.js"></script>
  </body>
</html>
