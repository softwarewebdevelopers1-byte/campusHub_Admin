<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecturer Course Entry</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 0;
      }

      .container {
        width: 90%;
        max-width: 800px;
        margin: 40px auto;
      }

      h2 {
        text-align: center;
        color: #333;
      }

      .form-box {
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        border: none;
        background: #007bff;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }

      table {
        width: 100%;
        margin-top: 30px;
        border-collapse: collapse;
        background: white;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
      }

      th {
        background: #007bff;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Lecturer Course Entry</h2>

      <div class="form-box">
        <label>Lecturer Name</label>
        <input
          type="text"
          id="lecturerName"
          placeholder="Enter lecturer name"
        />

        <label>Course Name</label>
        <input type="text" id="courseName" placeholder="Enter course name" />

        <label>Course Code</label>
        <input type="text" id="courseCode" placeholder="Enter course code" />

        <label>Department</label>
        <select id="department">
          <option value="">Select Department</option>
          <option>Computer Science</option>
          <option>Information Technology</option>
          <option>Business</option>
          <option>Education</option>
        </select>

        <button id="addCourse">Add Course</button>
      </div>

      <table id="courseTable">
        <thead>
          <tr>
            <th>Lecturer</th>
            <th>Course Name</th>
            <th>Course Code</th>
            <th>Department</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </div>

    <script>
      let lecturerName = document.getElementById("lecturerName");
      let courseName = document.getElementById("courseName");
      let courseCode = document.getElementById("courseCode");
      let department = document.getElementById("department");
      let addCourse = document.getElementById("addCourse");
      let courseTable = document
        .getElementById("courseTable")
        .getElementsByTagName("tbody")[0];

      addCourse.onclick = function () {
        if (
          lecturerName.value === "" ||
          courseName.value === "" ||
          courseCode.value === "" ||
          department.value === ""
        ) {
          alert("Please fill all fields");
          return;
        }

        let row = courseTable.insertRow();

        row.insertCell(0).innerHTML = lecturerName.value;
        row.insertCell(1).innerHTML = courseName.value;
        row.insertCell(2).innerHTML = courseCode.value;
        row.insertCell(3).innerHTML = department.value;

        lecturerName.value = "";
        courseName.value = "";
        courseCode.value = "";
        department.value = "";
      };
    </script>
  </body>
</html>
