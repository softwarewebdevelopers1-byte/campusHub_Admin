<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload PDF Resource</title>

    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
      }

      body {
        background: #f4f6fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 450px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .header {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .subtitle {
        font-size: 14px;
        color: #777;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      .upload-box {
        border: 2px dashed #bbb;
        border-radius: 10px;
        padding: 30px;
        cursor: pointer;
        transition: 0.2s;
      }

      .upload-box:hover {
        border-color: #4c7dff;
        background: #f8faff;
      }

      .icon {
        font-size: 40px;
      }

      .file-text {
        margin-top: 10px;
        font-weight: 600;
      }

      .subtext {
        font-size: 12px;
        color: #888;
      }

      .buttons {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .upload {
        background: #4c7dff;
        color: white;
      }

      .preview {
        background: #444;
        color: white;
      }

      .clear {
        background: #e74c3c;
        color: white;
      }

      .message {
        margin-top: 15px;
        font-size: 14px;
      }

      .success {
        color: green;
      }

      .error {
        color: red;
      }

      .loader {
        display: none;
        margin-top: 15px;
      }

      .loader::after {
        content: "";
        width: 30px;
        height: 30px;
        border: 4px solid #ddd;
        border-top: 4px solid #4c7dff;
        border-radius: 50%;
        display: inline-block;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Preview overlay */

      #previewFrame {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 1000;
      }

      #closePreview {
        display: none;
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 15px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        z-index: 1100;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">Upload PDF Resource</div>
      <div class="subtitle">AI Summarization happens here</div>

      <input type="text" id="courseTitle" placeholder="Course Title" />
      <input type="text" id="unitName" placeholder="Unit Name" />
      <input type="text" id="unitCode" placeholder="Unit Code" />

      <div class="upload-box" id="uploadBox">
        <div class="icon">📄</div>
        <div class="file-text" id="fileText">Click to select a PDF file</div>
        <div class="subtext">Maximum file size: 5MB</div>
      </div>

      <input type="file" id="fileInput" accept=".pdf" style="display: none" />

      <div class="buttons" id="buttonGroup" style="display: none">
        <button class="upload" id="uploadBtn">Upload</button>
        <button class="preview" id="previewBtn">Preview</button>
        <button class="clear" id="clearBtn">Clear</button>
      </div>

      <div class="loader" id="loader"></div>
      <div class="message" id="message"></div>
    </div>

    <button id="closePreview">Close</button>

    <div id="previewFrame">
      <iframe id="pdfViewer"></iframe>
    </div>

    <script type="module" src="../lecturer.js/upload.js"></script>
  </body>
</html>
