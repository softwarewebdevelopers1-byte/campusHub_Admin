<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecturer — Dashboard Content</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f9;
      }
      h2 {
        margin-top: 0;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 18px;
      }
      .card {
        background: #fff;
        padding: 18px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }
      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        background: #fff;
      }
      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
        text-align: left;
      }
      th {
        background: #f3f4f6;
      }
      button {
        padding: 8px 12px;
        border: 0;
        background: #2563eb;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <h2>Dashboard</h2>
    <div class="cards">
      <div class="card">
        <h3>Total Courses</h3>
        <p>4</p>
      </div>
      <div class="card">
        <h3>Total Students</h3>
        <p id="studentsCount">230</p>
      </div>
      <div class="card">
        <h3>Assignments</h3>
        <p>12</p>
      </div>
      <div class="card">
        <h3>Notifications</h3>
        <p>5</p>
      </div>
    </div>

    <h2 style="margin-top: 30px">My Courses</h2>
    <table>
      <tr>
        <th>Course</th>
        <th>Code</th>
        <th>Students</th>
        <th>Action</th>
      </tr>
      <tr>
        <td>Data Structures</td>
        <td>CSC204</td>
        <td>80</td>
        <td><button>Upload Notes</button></td>
      </tr>
      <tr>
        <td>Web Development</td>
        <td>CSC301</td>
        <td>65</td>
        <td><button>Upload Notes</button></td>
      </tr>
      <tr>
        <td>Database Systems</td>
        <td>CSC210</td>
        <td>85</td>
        <td><button>Upload Notes</button></td>
      </tr>
    </table>
  </body>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const studentsCount = localStorage.getItem("studentsCount");
      if (studentsCount) {
        document.getElementById("studentsCount").textContent =
          studentsCount || 0;
      }
    });
  </script>
</html>
