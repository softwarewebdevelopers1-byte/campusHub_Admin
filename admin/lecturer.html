<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" type="image/x-icon" href="./images/campusHub.png" />
    <title>CampusHub Lecturer Dashboard</title>
    <style>
      :root {
        --nav: #1e3a8a;
        --sidebar: #111827;
        --muted: #f4f6f9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--muted);
      }
      .navbar {
        background: var(--nav);
        color: #fff;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .navbar h2 {
        margin: 0;
        font-size: 18px;
      }
      .profile {
        display: flex;
        height: 100%;
        gap: 10px;
        align-items: center;
      }
      .app {
        display: flex;
        height: calc(100vh - 56px);
      }
      .sidebar {
        width: 220px;
        background: var(--sidebar);
        color: #fff;
        padding-top: 18px;
      }
      .sidebar a {
        display: block;
        color: #fff;
        padding: 12px 18px;
        text-decoration: none;
      }
      .sidebar a:hover {
        background: #374151;
      }
      .sidebar a.active {
        background: #2563eb;
      }

      .content-frame {
        flex: 1;
        border: 0;
        height: 100%;
      }

      /* small utilities for iframe fallback */
      .no-iframe {
        display: none;
        padding: 20px;
      }
      @media (max-width: 700px) {
        .sidebar {
          width: 72px;
        }
        .sidebar a {
          padding: 12px 10px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <h2>CampusHub - Lecturer</h2>
      <div class="profile">
        <i class="fas fa-user-tie"></i>
        <span id="userName"></span>
      </div>
    </div>

    <div class="app">
      <nav class="sidebar" aria-label="Main navigation">
        <a
          href="lecturer_content.html"
          data-src="./lecturersPages/lecturer_content.html"
          class="active"
        >
          <i class="fas fa-chart-line"></i> Dashboard
        </a>

        <a href="#" data-src="./lecturersPages/upload.html">
          <i class="fas fa-upload"></i> Upload Notes
        </a>

        <a href="#" data-src="my_courses.html">
          <i class="fas fa-book"></i> My Courses
        </a>

        <a href="#" data-src="students.html">
          <i class="fas fa-user-graduate"></i> Students
        </a>

        <a href="#" data-src="assignments.html">
          <i class="fas fa-file-alt"></i> Assignments
        </a>

        <a href="#" data-src="messages.html">
          <i class="fas fa-envelope"></i> Messages
        </a>

        <a href="#" data-src="logout.html">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </nav>

      <iframe
        id="contentFrame"
        class="content-frame"
        src="./lecturersPages/lecturer_content.html"
        title="Lecturer content"
      ></iframe>
    </div>

    <script type="module" src="./lecturer.js/lecturerPage.js"></script>
  </body>
</html>
